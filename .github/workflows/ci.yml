name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: make build
      - name: Smoke test
        run: ./kumo --version

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      # The official golangci-lint-action lags behind v2 and pins an older Go
      # toolchain. `go install` keeps the same toolchain as the rest of CI.
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint
        run: golangci-lint run --timeout=5m
